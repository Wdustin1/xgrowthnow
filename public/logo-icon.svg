<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Diagonal 1: top-left to bottom-right -->
  <line x1="14" y1="10" x2="86" y2="90" stroke="#1d9bf0" stroke-width="19" stroke-linecap="round"/>
  <!-- Diagonal 2 bottom: bottom-left to center -->
  <line x1="14" y1="90" x2="50" y2="50" stroke="#1d9bf0" stroke-width="19" stroke-linecap="round"/>
  <!-- Diagonal 2 top: center extending to arrow tip (northeast) -->
  <line x1="50" y1="50" x2="83" y2="13" stroke="#1d9bf0" stroke-width="19" stroke-linecap="round"/>
  <!-- Arrowhead pointing northeast -->
  <polygon points="97,3 75,10 90,25" fill="#1d9bf0"/>
</svg>
