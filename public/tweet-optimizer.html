<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Tweet Optimizer — XGrowthNow</title>
  <link rel="stylesheet" href="/theme.css">
  <style>
    body { min-height: 100vh; }
    main { max-width: 760px; margin: 0 auto; padding: 40px 20px 80px; }

    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 6px; }
    .page-header p { font-size: 14px; color: var(--text-mute); }

    .input-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px;
      margin-bottom: 24px;
    }
    .input-label { font-size: 13px; font-weight: 700; color: var(--text-mute); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    textarea.input { min-height: 140px; resize: vertical; line-height: 1.5; }
    .char-count { font-size: 12px; color: var(--text-mute); text-align: right; margin-top: 6px; }
    .char-count.over { color: var(--danger); }
    .optimize-btn { width: 100%; margin-top: 14px; }

    .results-section { margin-top: 8px; }
    .results-title { font-size: 14px; font-weight: 700; color: var(--text-mute); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
    .version-cards { display: flex; flex-direction: column; gap: 14px; }
    .version-card {
      position: relative;
      border-left: 2px solid var(--accent);
      padding-left: 20px;
    }
    .version-num { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .version-text { font-size: 15px; line-height: 1.55; margin-bottom: 12px; white-space: pre-wrap; word-break: break-word; }
    .version-why { font-size: 13px; color: var(--text-mute); line-height: 1.4; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; }
    .version-why strong { color: var(--text); }
    .copy-btn {
      position: absolute; top: 14px; right: 16px;
    }
    .copy-btn.copied { border-color: var(--success); color: var(--success); }

    .coming-soon {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 48px 32px; text-align: center;
    }
    .coming-soon .icon { display: flex; justify-content: center; margin-bottom: 16px; }
    .coming-soon .icon svg { width: 40px; height: 40px; color: var(--accent); stroke-width: 1.5; }
    .coming-soon h2 { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
    .coming-soon p { font-size: 14px; color: var(--text-mute); max-width: 360px; margin: 0 auto; line-height: 1.5; }

    .error-msg { background: rgba(255,95,95,0.08); border: 1px solid rgba(255,95,95,0.25); color: var(--danger); border-radius: 10px; padding: 12px 16px; font-size: 14px; margin-top: 16px; display: none; }
    .error-msg.show { display: block; }

    .spinner { display: none; }
    .spinner.show { display: block; }
  </style>
  <script>const sidebarPage = 'tweet-optimizer';</script>
</head>
<body class="has-sidebar">

<main>
  <div class="page-header">
    <h1>AI Tweet Optimizer</h1>
    <p>Rewrite your draft 3 ways to maximize engagement — powered by GPT-4o</p>
  </div>

  <div id="mainContent">
    <div class="input-card">
      <div class="input-label">Your draft tweet</div>
      <textarea class="input" id="draftInput" placeholder="Type your tweet draft here..." maxlength="1000"></textarea>
      <div class="char-count" id="charCount">0 / 280</div>
      <button class="btn btn-primary optimize-btn" id="optimizeBtn" onclick="optimize()">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Optimize →</span>
      </button>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="results-section" id="resultsSection" style="display:none;">
      <div class="results-title">3 Optimized Versions</div>
      <div class="version-cards" id="versionCards"></div>
    </div>
  </div>

  <div id="comingSoon" class="coming-soon" style="display:none;">
    <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg></span>
    <h2>Coming Soon</h2>
    <p>OpenAI integration is pending configuration. Check back soon — this feature is almost ready!</p>
  </div>
</main>

<footer class="app-footer"><img class="footer-mark" src="/logo-icon.png" alt="" aria-hidden="true"/> XGrowth — Built by <a href="https://x.com/investwithdoc" target="_blank">@InvestWithDoc</a></footer>

<script src="/sidebar.js"></script>
<script>
const textarea  = document.getElementById('draftInput');
const charCount = document.getElementById('charCount');

textarea.addEventListener('input', () => {
  const len = textarea.value.length;
  charCount.textContent = `${len} / 280`;
  charCount.className   = 'char-count' + (len > 280 ? ' over' : '');
});

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

async function optimize() {
  const draft = textarea.value.trim();
  if (!draft) { showError('Please enter a tweet draft first.'); return; }

  const btn     = document.getElementById('optimizeBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const errEl   = document.getElementById('errorMsg');

  btn.disabled = true;
  spinner.classList.add('show');
  btnText.textContent = 'Optimizing...';
  errEl.classList.remove('show');
  document.getElementById('resultsSection').style.display = 'none';

  try {
    const r = await fetch('/api/tools/tweet-optimizer', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ draft }),
    });

    if (r.status === 401) { location.href = '/api/auth/login'; return; }

    const data = await r.json();

    if (data.error === 'OpenAI key not configured') {
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('comingSoon').style.display  = 'block';
      return;
    }

    if (data.error) { showError(data.error); return; }

    const versions = data.versions || [];
    if (!versions.length) { showError('No versions returned — please try again.'); return; }

    const cards = versions.map((v, i) => `
      <div class="card version-card">
        <div class="version-num">Version ${i + 1}</div>
        <button class="btn btn-sm btn-secondary copy-btn" onclick="copyText(${JSON.stringify(v.text)}, this)">Copy</button>
        <div class="version-text">${escHtml(v.text)}</div>
        ${v.why ? `<div class="version-why"><strong>Why this works:</strong> ${escHtml(v.why)}</div>` : ''}
      </div>
    `).join('');

    document.getElementById('versionCards').innerHTML = cards;
    document.getElementById('resultsSection').style.display = 'block';
  } catch (e) {
    showError('Network error — please try again.');
  } finally {
    btn.disabled = false;
    spinner.classList.remove('show');
    btnText.textContent = 'Optimize →';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

initLayout();
</script>
</body>
</html>
