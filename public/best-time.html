<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Best Time to Post — XGrowthNow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000; --surface: #0f0f0f; --card: #16181c; --border: #2f3336;
      --text: #e7e9ea; --muted: #71767b; --blue: #1d9bf0; --green: #00ba7c;
      --yellow: #ffd400; --radius: 14px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }

    .inner { max-width: 900px; margin: 0 auto; padding: 36px 20px 80px; }
    .page-title { font-size: 24px; font-weight: 900; margin-bottom: 4px; }
    .page-sub   { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }

    /* Top slot cards */
    .top-slots { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .slot-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 16px; text-align: center; position: relative; }
    .slot-card.gold   { border-color: var(--yellow); background: rgba(255,212,0,0.06); }
    .slot-card.silver { border-color: #aaa; background: rgba(170,170,170,0.05); }
    .slot-card.bronze { border-color: #cd7f32; background: rgba(205,127,50,0.05); }
    .slot-rank  { font-size: 20px; margin-bottom: 6px; }
    .slot-day   { font-size: 16px; font-weight: 800; margin-bottom: 2px; }
    .slot-time  { font-size: 22px; font-weight: 900; color: var(--blue); margin-bottom: 4px; }
    .slot-sample { font-size: 11px; color: var(--muted); }

    /* Heatmap */
    .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 14px; margin-top: 32px; }
    .heatmap-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 20px 16px; overflow-x: auto; }
    .hm-day-lbl { font-size: 12px; font-weight: 700; color: var(--muted); text-align: center; padding-bottom: 4px; }
    .hm-hour-lbl { font-size: 10px; color: var(--muted); text-align: right; padding-right: 8px; display: flex; align-items: center; justify-content: flex-end; height: 22px; }
    .hm-cell { height: 22px; border-radius: 3px; cursor: default; transition: filter 0.1s; }
    .hm-cell:hover { filter: brightness(1.3); }
    .heatmap-grid { display: grid; gap: 3px; min-width: 600px; }
    .heatmap-cell {
      height: 28px; border-radius: 4px; cursor: default;
      position: relative; transition: transform 0.1s;
    }
    .heatmap-cell:hover { transform: scale(1.15); z-index: 10; }
    .heatmap-axis-label { font-size: 10px; color: var(--muted); display: flex; align-items: center; justify-content: center; }

    /* Tooltip */
    .tooltip { position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12px; pointer-events: none; z-index: 999; display: none; }

    /* Bar charts */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    @media (max-width: 640px) { .charts-row { grid-template-columns: 1fr; } }
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .chart-title { font-size: 13px; font-weight: 700; margin-bottom: 14px; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
    .bar-label { font-size: 12px; color: var(--muted); width: 32px; flex-shrink: 0; text-align: right; }
    .bar-track { flex: 1; background: var(--border); border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 4px; background: var(--blue); transition: width 0.6s ease; }
    .bar-fill.top { background: var(--yellow); }
    .bar-val   { font-size: 11px; color: var(--muted); width: 30px; flex-shrink: 0; }

    /* Stats chips */
    .stats-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 28px; }
    .stat-chip { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px; }
    .stat-chip strong { display: block; font-size: 22px; font-weight: 900; color: var(--blue); }

    /* Loading */
    #stateLoading { text-align: center; padding: 80px 0; color: var(--muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TZ note */
    .tz-note { font-size: 12px; color: var(--muted); text-align: right; margin-top: 8px; }

    /* Legend */
    .legend { display: flex; align-items: center; gap: 6px; margin-top: 12px; justify-content: flex-end; }
    .legend span { font-size: 11px; color: var(--muted); }
    .legend-bar { width: 80px; height: 10px; border-radius: 4px; background: linear-gradient(90deg, #0d2137, #1d9bf0, #7dd3fc); }
  </style>
</head>
<body class="has-sidebar">

<div class="inner">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:4px;">
    <h1 class="page-title">⏰ Best Time to Post</h1>
    <button onclick="load()" style="border:1px solid var(--border);background:none;color:var(--text);border-radius:50px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;">↺ Refresh</button>
  </div>
  <p class="page-sub">Based on YOUR tweet history — when your posts get the most engagement. Data from your last ~200 original tweets.</p>

  <div id="stateLoading">
    <div class="spinner"></div>
    Analyzing your tweet history...
    <div style="font-size:12px;margin-top:8px;color:var(--border)">This takes ~20 seconds</div>
  </div>

  <div id="stateContent" style="display:none;">
    <div class="stats-row" id="statsRow"></div>
    <div class="section-title">🏆 Your Top 5 Best Times</div>
    <div class="top-slots" id="topSlots"></div>

    <div class="section-title">📊 Engagement Heatmap</div>
    <div class="heatmap-wrap">
      <div id="heatmapGrid"></div>
      <div class="legend">
        <span>Low</span>
        <div class="legend-bar"></div>
        <span>High engagement</span>
      </div>
      <div class="tz-note" id="tzNote"></div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">By Hour of Day</div>
        <div id="hourChart"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">By Day of Week</div>
        <div id="dayChart"></div>
      </div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script src="/sidebar.js"></script>
<script>
const DAY_NAMES  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const HOUR_LABELS = Array.from({length: 24}, (_, i) => {
  if (i === 0)  return '12am';
  if (i === 12) return '12pm';
  return i < 12 ? `${i}am` : `${i-12}pm`;
});

// Browser timezone offset in hours (to shift UTC heatmap to local)
const TZ_OFFSET = -new Date().getTimezoneOffset() / 60;

function shiftHour(utcHour) {
  return ((utcHour + TZ_OFFSET) % 24 + 24) % 24;
}

function shiftDay(utcDay, utcHour) {
  // If the hour wraps past midnight, shift day too
  const shifted = utcHour + TZ_OFFSET;
  if (shifted >= 24)  return (utcDay + 1) % 7;
  if (shifted < 0)    return (utcDay + 6) % 7;
  return utcDay;
}

function formatHour(h) {
  if (h === 0)  return '12:00 AM';
  if (h === 12) return '12:00 PM';
  return h < 12 ? `${h}:00 AM` : `${h-12}:00 PM`;
}

initLayout().then(user => {
  if (!user) { window.location.href = '/api/auth/login'; return; }
  load();
});

async function load() {
  document.getElementById('stateLoading').style.display = 'block';
  document.getElementById('stateContent').style.display = 'none';

  try {
    const res  = await fetch('/api/tools/best-time');
    const data = await res.json();

    document.getElementById('stateLoading').style.display = 'none';
    if (data.error) {
      document.getElementById('stateLoading').innerHTML = `<div style="color:var(--muted);padding:60px 0;">${data.error}</div>`;
      document.getElementById('stateLoading').style.display = 'block';
      return;
    }

    renderStats(data);
    renderTopSlots(data.topSlots);
    renderHeatmap(data.heatmap);
    renderHourChart(data.byHour);
    renderDayChart(data.byDay);

    const tzName = Intl.DateTimeFormat().resolvedOptions().timeZone;
    document.getElementById('tzNote').textContent = `Times shown in ${tzName}`;

    document.getElementById('stateContent').style.display = 'block';
  } catch (e) {
    document.getElementById('stateLoading').innerHTML = `<div style="color:var(--muted);padding:60px 0;">Error: ${e.message}</div>`;
  }
}

function renderStats(data) {
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-chip"><strong>${data.tweets}</strong>tweets analyzed</div>
    <div class="stat-chip"><strong>${data.topSlots?.[0] ? DAY_NAMES[shiftDay(data.topSlots[0].day, data.topSlots[0].hour)] : '—'}</strong>best day</div>
    <div class="stat-chip"><strong>${data.topSlots?.[0] ? formatHour(shiftHour(data.topSlots[0].hour)) : '—'}</strong>best hour</div>
  `;
}

const rankStyles = ['gold','silver','bronze','',''];
const rankEmojis = ['🥇','🥈','🥉','4️⃣','5️⃣'];

function renderTopSlots(slots) {
  const el = document.getElementById('topSlots');
  el.innerHTML = slots.map((s, i) => {
    const localHour = shiftHour(s.hour);
    const localDay  = shiftDay(s.day, s.hour);
    return `
      <div class="slot-card ${rankStyles[i]}">
        <div class="slot-rank">${rankEmojis[i]}</div>
        <div class="slot-day">${DAY_NAMES[localDay]}</div>
        <div class="slot-time">${formatHour(localHour)}</div>
        <div class="slot-sample">${s.sampleSize} post${s.sampleSize !== 1 ? 's' : ''} sampled</div>
      </div>
    `;
  }).join('');
}

function renderHeatmap(heatmap) {
  // Convert UTC grid to local timezone
  const localGrid = Array.from({length: 7}, () => Array(24).fill(0));
  for (let d = 0; d < 7; d++) {
    for (let h = 0; h < 24; h++) {
      const localH = shiftHour(h);
      const localD = shiftDay(d, h);
      localGrid[localD][localH] += heatmap[d][h];
    }
  }

  const max = Math.max(...localGrid.flat());
  const norm = localGrid.map(row => row.map(v => max > 0 ? v / max : 0));

  // ── X Analytics style: days = columns, hours = rows ──────────────────────
  const container = document.getElementById('heatmapGrid');
  container.innerHTML = '';

  // Outer wrapper
  const wrap = document.createElement('div');
  wrap.style.cssText = 'overflow-x:auto;';

  const table = document.createElement('div');
  // 1 label col + 7 day cols
  table.style.cssText = `display:grid;grid-template-columns:44px repeat(7,1fr);gap:4px;min-width:480px;`;

  // ── Header row: empty corner + day labels ─────────────────────────────────
  const corner = makeEl('div', '', '');
  table.appendChild(corner);

  const DAY_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  DAY_SHORT.forEach(name => {
    const lbl = makeEl('div', 'hm-day-lbl', name);
    table.appendChild(lbl);
  });

  // ── Data rows: one per hour ───────────────────────────────────────────────
  for (let h = 0; h < 24; h++) {
    // Hour label — show every 3 hours, right-aligned
    const hourLbl = makeEl('div', 'hm-hour-lbl', h % 3 === 0 ? HOUR_LABELS[h] : '');
    table.appendChild(hourLbl);

    for (let d = 0; d < 7; d++) {
      const v    = norm[d][h];
      const cell = makeEl('div', 'hm-cell', '');
      cell.style.background = xColor(v);

      const rawVal = localGrid[d][h];
      const label  = `${DAY_NAMES[d]} ${formatHour(h)}\nEng. score: ${rawVal > 0 ? rawVal.toFixed(1) : 'no data'}`;
      cell.addEventListener('mouseenter', e => showTooltip(e, label));
      cell.addEventListener('mouseleave', hideTooltip);
      cell.addEventListener('mousemove',  moveTooltip);
      table.appendChild(cell);
    }
  }

  // ── Legend ────────────────────────────────────────────────────────────────
  const legend = document.createElement('div');
  legend.style.cssText = 'display:flex;align-items:center;gap:6px;margin-top:12px;font-size:11px;color:var(--muted);justify-content:flex-end;';
  legend.innerHTML = `
    <span>Less</span>
    ${[0,0.2,0.4,0.65,0.85,1].map(v=>`<div style="width:14px;height:14px;border-radius:3px;background:${xColor(v)}"></div>`).join('')}
    <span>More</span>
  `;

  wrap.appendChild(table);
  wrap.appendChild(legend);
  container.appendChild(wrap);
}

function xColor(v) {
  // Matches X Analytics Active Times palette: near-black → mid-blue → deep blue
  if (v === 0)    return '#1c2732';
  if (v < 0.15)  return '#1a3a5c';
  if (v < 0.35)  return '#1a5289';
  if (v < 0.55)  return '#1877c2';
  if (v < 0.75)  return '#1d9bf0';
  if (v < 0.9)   return '#60b8f5';
  return '#a8d8fb';
}

function makeEl(tag, className, text) {
  const el = document.createElement(tag);
  if (className) el.className = className;
  if (text) el.textContent = text;
  return el;
}

function renderHourChart(byHour) {
  const localHour = Array(24).fill(0);
  byHour.forEach((v, h) => { localHour[shiftHour(h)] += v; });
  const max = Math.max(...localHour);
  const container = document.getElementById('hourChart');
  // Show every 2 hours
  container.innerHTML = Array.from({length: 24}, (_, h) => {
    if (h % 2 !== 0) return '';
    const pct   = max > 0 ? (localHour[h] / max * 100).toFixed(0) : 0;
    const isTop = pct >= 80;
    return `
      <div class="bar-row">
        <div class="bar-label">${HOUR_LABELS[h]}</div>
        <div class="bar-track"><div class="bar-fill ${isTop ? 'top' : ''}" style="width:${pct}%"></div></div>
        <div class="bar-val" style="${isTop ? 'color:var(--yellow);font-weight:700' : ''}">${isTop ? '🔥' : ''}</div>
      </div>
    `;
  }).join('');
}

function renderDayChart(byDay) {
  const localDay = Array(7).fill(0);
  byDay.forEach((v, d) => { localDay[d] += v; });
  const max = Math.max(...localDay);
  const container = document.getElementById('dayChart');
  container.innerHTML = DAY_NAMES.map((name, d) => {
    const pct   = max > 0 ? (localDay[d] / max * 100).toFixed(0) : 0;
    const isTop = pct >= 80;
    return `
      <div class="bar-row">
        <div class="bar-label">${name}</div>
        <div class="bar-track"><div class="bar-fill ${isTop ? 'top' : ''}" style="width:${pct}%"></div></div>
        <div class="bar-val" style="${isTop ? 'color:var(--yellow);font-weight:700' : ''}">${isTop ? '🔥' : ''}</div>
      </div>
    `;
  }).join('');
}

// Tooltip
function showTooltip(e, text) {
  const t = document.getElementById('tooltip');
  t.innerHTML = text.replace('\n','<br>');
  t.style.display = 'block';
  moveTooltip(e);
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }
function moveTooltip(e) {
  const t = document.getElementById('tooltip');
  t.style.left = (e.clientX + 12) + 'px';
  t.style.top  = (e.clientY - 8) + 'px';
}
</script>
</body>
</html>
