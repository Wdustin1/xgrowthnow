<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Top 5 Tweets — XGrowthNow</title>
  <link rel="stylesheet" href="/theme.css">
  <style>
    body { min-height: 100vh; }
    main { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }

    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 6px; }
    .page-header p { font-size: 14px; color: var(--text-mute); }

    .state-box { text-align: center; padding: 60px 24px; }
    .state-icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .state-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .state-sub { font-size: 14px; color: var(--text-mute); }
    .progress-bar-wrap { height: 4px; background: var(--border-hi); border-radius: 2px; margin-top: 20px; max-width: 300px; margin-inline: auto; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

    .tweet-card {
      padding: 24px;
      margin-bottom: 16px; position: relative; overflow: hidden;
    }
    .rank-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .rank-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .rank-label { font-size: 13px; font-weight: 700; }
    .rank-num {
      font-family: 'Geist Mono', monospace;
      font-size: 28px; font-weight: 600;
      color: var(--text-faint);
      letter-spacing: -0.02em;
      font-feature-settings: "tnum" 1;
    }
    .rank-date { margin-left: auto; font-size: 12px; color: var(--text-mute); }
    .tweet-text { font-size: 15px; line-height: 1.65; margin-bottom: 16px; white-space: pre-wrap; word-break: break-word; }
    .tweet-media { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tweet-media img { height: 100px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); }

    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
    .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 6px; text-align: center; }
    .stat-num { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; font-family: 'Geist Mono', monospace; font-feature-settings: "tnum" 1; }
    .stat-label { font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .insights-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 24px; margin-top: 8px; }
    .insights-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-mute); margin-bottom: 14px; }
    .insight-row { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: var(--text-mute); line-height: 1.5; margin-bottom: 10px; }
    .insight-row:last-child { margin-bottom: 0; }
    .insight-arrow { color: var(--accent); flex-shrink: 0; margin-top: 1px; }

    .refresh-btn { margin-top: 20px; }
  </style>
  <script>const sidebarPage = 'top5';</script>
</head>
<body class="has-sidebar">

<main>
  <div class="page-header">
    <h1>My Top 5 Tweets</h1>
    <p>Your highest-performing tweets by impressions. Study what worked — and do more of it.</p>
  </div>

  <!-- Loading -->
  <div id="stateLoading" class="state-box">
    <span class="state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg></span>
    <div class="state-title">Analyzing your tweets...</div>
    <div class="state-sub">Scanning your recent posts for top performers</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="loadingBar" style="width:0%"></div></div>
  </div>

  <!-- Error -->
  <div id="stateError" class="state-box" style="display:none;">
    <span class="state-icon state-warn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></span>
    <div class="state-title" id="errorMsg">Something went wrong</div>
    <button class="btn btn-secondary" onclick="load()">Try Again</button>
  </div>

  <!-- Results -->
  <div id="stateContent" style="display:none;">
    <div id="tweetList"></div>
    <div class="insights-box">
      <div class="insights-title">What to take away</div>
      <div id="insights"></div>
    </div>
    <button class="btn btn-secondary refresh-btn" onclick="load()">Refresh</button>
  </div>
</main>

<footer class="app-footer"><img class="footer-mark" src="/logo-icon.png" alt="" aria-hidden="true"/> XGrowth — Built by <a href="https://x.com/investwithdoc" target="_blank">@InvestWithDoc</a></footer>

<script src="/sidebar.js"></script>
<script>
initLayout().then(() => { load(); });

const rankColors = ['#f5a623','#aaaaaa','#cd7f32','#555','#555'];

function fmt(n) {
  if (!n) return '0';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString();
}
function truncate(t, max=280) { return t && t.length > max ? t.slice(0,max)+'…' : (t||''); }
function timeAgo(ds) {
  const d = new Date(ds), diff = (Date.now()-d)/1000;
  if (diff < 3600)    return Math.floor(diff/60)+'m ago';
  if (diff < 86400)   return Math.floor(diff/3600)+'h ago';
  if (diff < 2592000) return Math.floor(diff/86400)+'d ago';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s) { return (s||'').replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$'); }

function renderTweets(tweets) {
  document.getElementById('tweetList').innerHTML = tweets.map((t, i) => `
    <div class="card card-hover tweet-card">
      <div class="rank-bar" style="background:${rankColors[i]};opacity:0.8;"></div>
      <div class="rank-header">
        <span class="rank-num">${String(i+1).padStart(2,'0')}</span>
        <span class="rank-label" style="color:${rankColors[i]==='#555'?'var(--text-mute)':rankColors[i]}">Rank</span>
        <span class="rank-date">${timeAgo(t.createdAt)}</span>
      </div>
      <div class="tweet-text">${esc(truncate(t.text))}</div>
      ${t.media?.length ? `<div class="tweet-media">${t.media.slice(0,2).map(m=>`<img src="${m.url}" onerror="this.style.display='none'"/>`).join('')}</div>` : ''}
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num mono" style="color:var(--accent)">${fmt(t.impressions)}</div><div class="stat-label">Impressions</div></div>
        <div class="stat-box"><div class="stat-num mono" style="color:var(--danger)">${fmt(t.likes)}</div><div class="stat-label">Likes</div></div>
        <div class="stat-box"><div class="stat-num mono" style="color:var(--success)">${fmt(t.retweets)}</div><div class="stat-label">RTs</div></div>
        <div class="stat-box"><div class="stat-num mono">${fmt(t.replies)}</div><div class="stat-label">Replies</div></div>
        <div class="stat-box"><div class="stat-num mono">${t.impressions>0?((t.likes/t.impressions)*100).toFixed(2)+'%':'—'}</div><div class="stat-label">Eng %</div></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <a class="btn btn-sm btn-secondary" href="${t.tweetUrl}" target="_blank">View on 𝕏 ↗</a>
        <button class="btn btn-sm btn-ghost" onclick="copyText(this,\`${escJs(t.text)}\`)">Copy Text</button>
      </div>
    </div>
  `).join('');
}

function renderInsights(tweets) {
  const avgViews = Math.round(tweets.reduce((s,t)=>s+(t.impressions||t.views||0),0)/tweets.length);
  const avgLikes = Math.round(tweets.reduce((s,t)=>s+t.likes,0)/tweets.length);
  const hasMedia = tweets.filter(t=>t.media?.length>0).length;
  const avgLen   = Math.round(tweets.reduce((s,t)=>s+(t.text?.length||0),0)/tweets.length);
  const dayCount = {};
  tweets.forEach(t=>{ const d=new Date(t.createdAt).toLocaleDateString('en-US',{weekday:'long'}); dayCount[d]=(dayCount[d]||0)+1; });
  const topDay = Object.entries(dayCount).sort((a,b)=>b[1]-a[1])[0];
  const lines = [
    `Your top tweets averaged <strong class="mono">${fmt(avgViews)} views</strong> and <strong class="mono">${fmt(avgLikes)} likes</strong>`,
    hasMedia>0 ? `<strong>${hasMedia} of your top 5</strong> included images or video — media drives reach` : `None of your top 5 had media — try adding images to boost reach`,
    `Average tweet length in your top 5: <strong class="mono">${avgLen} characters</strong>`,
    topDay ? `Most top tweets posted on <strong>${topDay[0]}</strong> — consider posting more on that day` : null,
  ].filter(Boolean);
  document.getElementById('insights').innerHTML = lines.map(l =>
    `<div class="insight-row"><span class="insight-arrow">→</span><span>${l}</span></div>`
  ).join('');
}

async function copyText(btn, text) {
  await navigator.clipboard.writeText(text);
  const orig = btn.textContent;
  btn.textContent = '✓ Copied!';
  setTimeout(()=>btn.textContent=orig, 2000);
}

async function load() {
  document.getElementById('stateLoading').style.display = 'block';
  document.getElementById('stateContent').style.display = 'none';
  document.getElementById('stateError').style.display   = 'none';
  let prog = 0;
  const bar = document.getElementById('loadingBar');
  const tick = setInterval(()=>{ prog=Math.min(prog+4,85); bar.style.width=prog+'%'; }, 300);
  try {
    const res  = await fetch('/api/tools/best-time?mode=top5');
    if (res.status === 401) { location.href='/api/auth/login'; return; }
    const data = await res.json();
    clearInterval(tick); bar.style.width='100%';
    if (!res.ok || data.error) throw new Error(data.error||'Failed to load');
    const tweets = data.top5||[];
    if (!tweets.length) throw new Error(data.debug?.error || 'No tweets found — try signing out and back in');
    setTimeout(()=>{
      document.getElementById('stateLoading').style.display='none';
      document.getElementById('stateContent').style.display='block';
      renderTweets(tweets);
      renderInsights(tweets);
    }, 300);
  } catch(e) {
    clearInterval(tick);
    document.getElementById('stateLoading').style.display='none';
    document.getElementById('stateError').style.display='block';
    document.getElementById('errorMsg').textContent=e.message;
  }
}

</script>
</body>
</html>
