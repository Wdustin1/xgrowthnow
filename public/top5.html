<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Top 5 Tweets — XGrowthNow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000; --surface: #0f0f0f; --card: #16181c; --border: #2f3336;
      --text: #e7e9ea; --muted: #71767b; --blue: #1d9bf0;
      --blue-dim: rgba(29,155,240,0.1); --red: #f4212e; --green: #00ba7c;
      --gold: #f5a623; --radius: 16px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon { width: 30px; height: 30px; background: var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .logo-text { font-size: 17px; font-weight: 800; color: var(--text); }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 6px; }
    .page-header p { font-size: 14px; color: var(--muted); }

    main { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }

    .state-box { text-align: center; padding: 60px 24px; }
    .state-icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .state-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .state-sub { font-size: 14px; color: var(--muted); }
    .progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-top: 20px; max-width: 300px; margin-inline: auto; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.3s; }

    .tweet-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
      margin-bottom: 16px; position: relative; overflow: hidden;
    }
    .rank-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .rank-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .rank-medal { font-size: 22px; }
    .rank-label { font-size: 13px; font-weight: 700; }
    .rank-date { margin-left: auto; font-size: 12px; color: var(--muted); }
    .tweet-text { font-size: 15px; line-height: 1.65; margin-bottom: 16px; white-space: pre-wrap; word-break: break-word; }
    .tweet-media { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tweet-media img { height: 100px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); }

    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
    .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 6px; text-align: center; }
    .stat-num { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .insights-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-top: 8px; }
    .insights-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 14px; }
    .insight-row { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
    .insight-row:last-child { margin-bottom: 0; }
    .insight-arrow { color: var(--blue); flex-shrink: 0; margin-top: 1px; }

    .refresh-btn {
      margin-top: 20px; background: transparent; color: var(--muted);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 9px 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: border-color 0.15s; font-family: inherit;
    }
    .refresh-btn:hover { border-color: var(--text); color: var(--text); }
  </style>
  <script>const sidebarPage = 'top5';</script>
</head>
<body class="has-sidebar">

<main>
  <div class="page-header">
    <h1>🏆 My Top 5 Tweets</h1>
    <p>Your highest-performing tweets by impressions. Study what worked — and do more of it.</p>
  </div>

  <!-- Loading -->
  <div id="stateLoading" class="state-box">
    <span class="state-icon">📊</span>
    <div class="state-title">Analyzing your tweets...</div>
    <div class="state-sub">Scanning your recent posts for top performers</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="loadingBar" style="width:0%"></div></div>
  </div>

  <!-- Error -->
  <div id="stateError" class="state-box" style="display:none;">
    <span class="state-icon">⚠️</span>
    <div class="state-title" id="errorMsg">Something went wrong</div>
    <button class="error-btn" onclick="load()">Try Again</button>
  </div>

  <!-- Results -->
  <div id="stateContent" style="display:none;">
    <div id="tweetList"></div>
    <div class="insights-box">
      <div class="insights-title">💡 What to take away</div>
      <div id="insights"></div>
    </div>
    <button class="refresh-btn" onclick="load()">🔄 Refresh</button>
  </div>
</main>

<script src="/sidebar.js"></script>
<script>
initLayout().then(() => { load(); });

const medals     = ['🥇','🥈','🥉','4️⃣','5️⃣'];
const rankColors = ['#f5a623','#aaaaaa','#cd7f32','#555','#555'];

function fmt(n) {
  if (!n) return '0';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString();
}
function truncate(t, max=280) { return t && t.length > max ? t.slice(0,max)+'…' : (t||''); }
function timeAgo(ds) {
  const d = new Date(ds), diff = (Date.now()-d)/1000;
  if (diff < 3600)    return Math.floor(diff/60)+'m ago';
  if (diff < 86400)   return Math.floor(diff/3600)+'h ago';
  if (diff < 2592000) return Math.floor(diff/86400)+'d ago';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s) { return (s||'').replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$'); }

function renderTweets(tweets) {
  document.getElementById('tweetList').innerHTML = tweets.map((t, i) => `
    <div class="tweet-card">
      <div class="rank-bar" style="background:${rankColors[i]};opacity:0.8;"></div>
      <div class="rank-header">
        <span class="rank-medal">${medals[i]}</span>
        <span class="rank-label" style="color:${rankColors[i]==='#555'?'var(--muted)':rankColors[i]}">Rank #${i+1}</span>
        <span class="rank-date">${timeAgo(t.createdAt)}</span>
      </div>
      <div class="tweet-text">${esc(truncate(t.text))}</div>
      ${t.media?.length ? `<div class="tweet-media">${t.media.slice(0,2).map(m=>`<img src="${m.url}" onerror="this.style.display='none'"/>`).join('')}</div>` : ''}
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num" style="color:var(--blue)">${fmt(t.impressions)}</div><div class="stat-label">Impressions</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red)">${fmt(t.likes)}</div><div class="stat-label">Likes</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${fmt(t.retweets)}</div><div class="stat-label">RTs</div></div>
        <div class="stat-box"><div class="stat-num">${fmt(t.replies)}</div><div class="stat-label">Replies</div></div>
        <div class="stat-box"><div class="stat-num">${t.impressions>0?((t.likes/t.impressions)*100).toFixed(2)+'%':'—'}</div><div class="stat-label">Eng %</div></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <a href="${t.tweetUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);color:var(--text);text-decoration:none;border-radius:20px;padding:7px 16px;font-size:13px;font-weight:600;">View on 𝕏 ↗</a>
        <button onclick="copyText(this,\`${escJs(t.text)}\`)" style="display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">📋 Copy Text</button>
      </div>
    </div>
  `).join('');
}

function renderInsights(tweets) {
  const avgViews = Math.round(tweets.reduce((s,t)=>s+(t.impressions||t.views||0),0)/tweets.length);
  const avgLikes = Math.round(tweets.reduce((s,t)=>s+t.likes,0)/tweets.length);
  const hasMedia = tweets.filter(t=>t.media?.length>0).length;
  const avgLen   = Math.round(tweets.reduce((s,t)=>s+(t.text?.length||0),0)/tweets.length);
  const dayCount = {};
  tweets.forEach(t=>{ const d=new Date(t.createdAt).toLocaleDateString('en-US',{weekday:'long'}); dayCount[d]=(dayCount[d]||0)+1; });
  const topDay = Object.entries(dayCount).sort((a,b)=>b[1]-a[1])[0];
  const lines = [
    `Your top tweets averaged <strong>${fmt(avgViews)} views</strong> and <strong>${fmt(avgLikes)} likes</strong>`,
    hasMedia>0 ? `<strong>${hasMedia} of your top 5</strong> included images or video — media drives reach` : `None of your top 5 had media — try adding images to boost reach`,
    `Average tweet length in your top 5: <strong>${avgLen} characters</strong>`,
    topDay ? `Most top tweets posted on <strong>${topDay[0]}</strong> — consider posting more on that day` : null,
  ].filter(Boolean);
  document.getElementById('insights').innerHTML = lines.map(l =>
    `<div class="insight-row"><span class="insight-arrow">→</span><span>${l}</span></div>`
  ).join('');
}

async function copyText(btn, text) {
  await navigator.clipboard.writeText(text);
  const orig = btn.textContent;
  btn.textContent = '✓ Copied!';
  setTimeout(()=>btn.textContent=orig, 2000);
}

async function load() {
  document.getElementById('stateLoading').style.display = 'block';
  document.getElementById('stateContent').style.display = 'none';
  document.getElementById('stateError').style.display   = 'none';
  let prog = 0;
  const bar = document.getElementById('loadingBar');
  const tick = setInterval(()=>{ prog=Math.min(prog+4,85); bar.style.width=prog+'%'; }, 300);
  try {
    const res  = await fetch('/api/tools/best-time?mode=top5');
    if (res.status === 401) { location.href='/api/auth/login'; return; }
    const data = await res.json();
    clearInterval(tick); bar.style.width='100%';
    if (!res.ok || data.error) throw new Error(data.error||'Failed to load');
    const tweets = data.top5||[];
    if (!tweets.length) throw new Error(data.debug?.error || 'No tweets found — try signing out and back in');
    setTimeout(()=>{
      document.getElementById('stateLoading').style.display='none';
      document.getElementById('stateContent').style.display='block';
      renderTweets(tweets);
      renderInsights(tweets);
    }, 300);
  } catch(e) {
    clearInterval(tick);
    document.getElementById('stateLoading').style.display='none';
    document.getElementById('stateError').style.display='block';
    document.getElementById('errorMsg').textContent=e.message;
  }
}

</script>
</body>
</html>
