<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Icon: X with upward arrow -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d9bf0"/>
      <stop offset="100%" stop-color="#5bb8f5"/>
    </linearGradient>
  </defs>

  <!-- X shape made of two diagonal bars -->
  <g transform="translate(4, 4)">
    <!-- top-left to bottom-right bar -->
    <rect x="3" y="0" width="8" height="34" rx="4" transform="rotate(38 3 0)" fill="url(#g)"/>
    <!-- top-right to bottom-left bar -->
    <rect x="28" y="0" width="8" height="34" rx="4" transform="rotate(-38 36 0)" fill="url(#g)"/>
    <!-- upward arrow on top of X -->
    <polygon points="20,0 27,12 23,12 23,22 17,22 17,12 13,12" fill="url(#g)"/>
  </g>

  <!-- Wordmark -->
  <text x="54" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="800" letter-spacing="-0.8" fill="#ffffff">XGrowth</text>
  <text x="155" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="800" letter-spacing="-0.8" fill="#1d9bf0">Now</text>
</svg>
